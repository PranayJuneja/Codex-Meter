name: Build Codex Meter APK

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android API 36 toolchain
        shell: bash
        run: |
          set -euo pipefail
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "$SDKMANAGER" ]]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Extract source archive
        shell: bash
        run: |
          set -euo pipefail
          rm -rf work
          mkdir -p work
          unzip -q CodexMeter-source-1.7.0.zip -d work
          test -x work/CodexMeter-1.7.0/build-ci.sh

      - name: Run regression tests
        shell: bash
        run: |
          set -euo pipefail
          cd work/CodexMeter-1.7.0
          ./run-tests.sh

      - name: Compile unsigned APK
        shell: bash
        run: |
          set -euo pipefail
          cd work/CodexMeter-1.7.0
          ./build-ci.sh 2>&1 | tee dist-ci/build.log

      - name: Upload unsigned APK and signing tool
        uses: actions/upload-artifact@v4
        with:
          name: codex-meter-1.7.0-ci
          path: work/CodexMeter-1.7.0/dist-ci/
          if-no-files-found: error
          retention-days: 3
