name: Build Codex Meter APK

on:
  pull_request:
    branches: [main]
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      version: ${{ steps.version.outputs.name }}
    env:
      GH_USERNAME: ${{ github.actor }}
      GH_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install Android API 36 toolchain
        shell: bash
        run: |
          set -euo pipefail
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "$SDKMANAGER" ]]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Validate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION_NAME="$(awk -F'"' '/versionName = "/ { print $2; exit }' app/build.gradle.kts)"
          if [[ -z "$VERSION_NAME" ]]; then
            echo "::error::Unable to read versionName from app/build.gradle.kts"
            exit 1
          fi
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" != "v$VERSION_NAME" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match app version v$VERSION_NAME"
            exit 1
          fi
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Run regression tests
        shell: bash
        run: |
          set -euo pipefail
          ./run-tests.sh

      - name: Run Android lint
        shell: bash
        run: |
          set -euo pipefail
          ./lint.sh

      - name: Configure release signing
        if: github.ref_type == 'tag'
        shell: bash
        env:
          ANDROID_SIGNING_PASSWORD: ${{ secrets.ANDROID_SIGNING_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "$ANDROID_SIGNING_PASSWORD" ]]; then
            echo "::error::Add the ANDROID_SIGNING_PASSWORD repository Actions secret"
            exit 1
          fi
          mkdir -p .local-signing
          INTEGRITY_KEY="$(
            printf 'Codex Meter release integrity\n%s' "$ANDROID_SIGNING_PASSWORD" |
              sha256sum | awk '{print $1}'
          )"
          EXPECTED_HMAC="$(tr -d '\n' < ci/release-keystore.p12.enc.hmac)"
          ACTUAL_HMAC="$(
            openssl dgst -sha256 -mac HMAC -macopt "hexkey:$INTEGRITY_KEY" \
              ci/release-keystore.p12.enc | awk '{print $NF}'
          )"
          if [[ "$ACTUAL_HMAC" != "$EXPECTED_HMAC" ]]; then
            echo "::error::Release keystore authentication failed"
            exit 1
          fi
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 600000 \
            -in ci/release-keystore.p12.enc \
            -out .local-signing/codex-meter-local.p12 \
            -pass env:ANDROID_SIGNING_PASSWORD
          printf '%s' "$ANDROID_SIGNING_PASSWORD" > .local-signing/password
          chmod 600 .local-signing/codex-meter-local.p12 .local-signing/password
          "$JAVA_HOME/bin/keytool" -list \
            -keystore .local-signing/codex-meter-local.p12 \
            -storetype PKCS12 \
            -storepass:env ANDROID_SIGNING_PASSWORD \
            -alias codexmeter >/dev/null

      - name: Build and verify APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          ./build.sh 2>&1 | tee dist/build.log

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: codex-meter-${{ steps.version.outputs.name }}-ci
          path: dist/
          if-no-files-found: error
          retention-days: 3

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download verified APK
        uses: actions/download-artifact@v8
        with:
          name: codex-meter-${{ needs.build.outputs.version }}-ci
          path: release-dist

      - name: Verify release checksum
        shell: bash
        run: |
          set -euo pipefail
          cd release-dist
          sha256sum -c SHA256SUMS.txt

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION_NAME: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --draft \
              --verify-tag \
              --generate-notes \
              --title "Codex Meter $VERSION_NAME"
          fi
          gh release upload "$GITHUB_REF_NAME" \
            "release-dist/CodexMeter-$VERSION_NAME.apk#Codex Meter $VERSION_NAME APK" \
            "release-dist/SHA256SUMS.txt#SHA-256 checksums" \
            --clobber
          gh release edit "$GITHUB_REF_NAME" --draft=false --latest
